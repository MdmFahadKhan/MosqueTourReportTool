<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Study — Spaced Repetition</title>
<style>
  :root{
    --bg:#0d1b1e;
    --bg-alt:#122a2e;
    --panel:#153338;
    --teal:#1f6f6b;
    --teal-light:#2f9d92;
    --gold:#d4af37;
    --gold-dim:#a98a2a;
    --text:#e8f0ef;
    --text-dim:#9db3b0;
    --danger:#c0524a;
    --good:#3c9d6c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:linear-gradient(160deg,var(--bg),var(--bg-alt));
    color:var(--text);
    min-height:100vh;
  }
  header{
    padding:20px 24px 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid rgba(212,175,55,0.25);
  }
  h1{
    font-size:1.4rem;
    margin:0;
    color:var(--gold);
    letter-spacing:0.5px;
  }
  .subtitle{color:var(--text-dim);font-size:0.85rem;margin-top:4px;}
  nav{
    display:flex;
    gap:8px;
    padding:14px 24px;
    flex-wrap:wrap;
  }
  .tab{
    background:var(--panel);
    color:var(--text-dim);
    border:1px solid rgba(212,175,55,0.15);
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    font-size:0.9rem;
    transition:0.15s;
  }
  .tab:hover{border-color:var(--gold-dim);color:var(--text);}
  .tab.active{
    background:var(--teal);
    color:#fff;
    border-color:var(--teal-light);
  }
  main{padding:0 24px 60px;max-width:900px;margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}

  .card-panel{
    background:var(--panel);
    border:1px solid rgba(212,175,55,0.15);
    border-radius:12px;
    padding:20px;
    margin-bottom:16px;
  }

  /* Decks view */
  .deck-list{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
  .deck-card{
    background:var(--panel);
    border:1px solid rgba(212,175,55,0.15);
    border-radius:12px;
    padding:16px;
    cursor:pointer;
    transition:0.15s;
    position:relative;
  }
  .deck-card:hover{border-color:var(--gold);transform:translateY(-2px);}
  .deck-name{font-weight:600;color:var(--gold);font-size:1.05rem;margin-bottom:6px;}
  .deck-meta{color:var(--text-dim);font-size:0.82rem;}
  .deck-due{
    display:inline-block;
    margin-top:8px;
    background:var(--teal);
    color:#fff;
    font-size:0.75rem;
    padding:3px 9px;
    border-radius:20px;
  }
  .deck-due.zero{background:rgba(255,255,255,0.06);color:var(--text-dim);}
  .deck-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px;}
  .icon-btn{
    background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.95rem;
    padding:2px 4px;
  }
  .icon-btn:hover{color:var(--gold);}

  input,textarea,select{
    width:100%;
    background:var(--bg-alt);
    border:1px solid rgba(212,175,55,0.25);
    color:var(--text);
    padding:10px 12px;
    border-radius:8px;
    font-size:0.95rem;
    font-family:inherit;
    margin-bottom:10px;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold);}
  label{font-size:0.8rem;color:var(--text-dim);display:block;margin-bottom:4px;}

  .btn{
    background:var(--teal);
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:0.9rem;
    font-weight:500;
    transition:0.15s;
  }
  .btn:hover{background:var(--teal-light);}
  .btn.gold{background:var(--gold);color:#1a1a1a;}
  .btn.gold:hover{background:#e6c34d;}
  .btn.ghost{background:none;border:1px solid rgba(212,175,55,0.3);color:var(--text-dim);}
  .btn.ghost:hover{color:var(--text);border-color:var(--gold);}
  .btn.small{padding:6px 12px;font-size:0.8rem;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}

  /* Review */
  .review-wrap{max-width:560px;margin:0 auto;}
  .progress-bar{
    height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-bottom:18px;
  }
  .progress-fill{height:100%;background:var(--gold);transition:width 0.2s;}
  .flashcard{
    background:var(--panel);
    border:1px solid rgba(212,175,55,0.2);
    border-radius:16px;
    padding:40px 28px;
    min-height:180px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:1.2rem;
    cursor:pointer;
    line-height:1.5;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
  }
  .flashcard .tag{
    position:absolute;
    margin-top:-140px;
    font-size:0.7rem;
    color:var(--text-dim);
  }
  .hint{text-align:center;color:var(--text-dim);font-size:0.8rem;margin:12px 0 20px;}
  .grade-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .grade-btn{
    padding:12px 6px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-size:0.85rem;
    font-weight:600;
    color:#fff;
  }
  .grade-again{background:var(--danger);}
  .grade-hard{background:#b57a2f;}
  .grade-good{background:var(--good);}
  .grade-easy{background:var(--teal-light);}
  .grade-btn small{display:block;font-weight:400;font-size:0.7rem;opacity:0.85;margin-top:2px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
  .empty-state h3{color:var(--gold);margin-bottom:8px;}

  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
  .stat-box{background:var(--panel);border:1px solid rgba(212,175,55,0.15);border-radius:10px;padding:16px;text-align:center;}
  .stat-num{font-size:1.6rem;color:var(--gold);font-weight:700;}
  .stat-label{font-size:0.75rem;color:var(--text-dim);margin-top:4px;}

  .card-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    gap:10px;
  }
  .card-row:last-child{border-bottom:none;}
  .card-text{font-size:0.88rem;}
  .card-text .front{color:var(--text);}
  .card-text .back{color:var(--text-dim);font-size:0.8rem;}

  .modal-bg{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);
    align-items:center;justify-content:center;z-index:50;
  }
  .modal-bg.active{display:flex;}
  .modal{
    background:var(--bg-alt);
    border:1px solid var(--gold-dim);
    border-radius:14px;
    padding:24px;
    width:90%;
    max-width:420px;
  }
  .modal h3{color:var(--gold);margin-top:0;}
  .back-link{color:var(--text-dim);cursor:pointer;font-size:0.85rem;margin-bottom:12px;display:inline-block;}
  .back-link:hover{color:var(--gold);}
</style>
</head>
<body>

<header>
  <div>
    <h1>📚 Flashcard Study</h1>
    <div class="subtitle">Offline spaced repetition — works fully local, no account needed</div>
  </div>
</header>

<nav>
  <div class="tab active" data-tab="decks">Decks</div>
  <div class="tab" data-tab="stats">Stats</div>
</nav>

<main>

  <!-- DECKS VIEW -->
  <div class="view active" id="view-decks">
    <div class="card-panel">
      <label>New deck name</label>
      <div style="display:flex;gap:8px;">
        <input id="new-deck-name" placeholder="e.g. PL/SQL Syntax, Islamic Studies, Cert Prep">
        <button class="btn gold" onclick="createDeck()">Add Deck</button>
      </div>
    </div>
    <div class="deck-list" id="deck-list"></div>
  </div>

  <!-- DECK DETAIL VIEW -->
  <div class="view" id="view-deck-detail">
    <span class="back-link" onclick="showTab('decks')">← Back to decks</span>
    <div class="card-panel">
      <h3 id="detail-deck-name" style="color:var(--gold);margin-top:0;"></h3>
      <div class="btn-row">
        <button class="btn" onclick="startReview()">▶ Start Review</button>
        <button class="btn ghost" onclick="openCardModal()">+ Add Card</button>
      </div>
    </div>
    <div class="card-panel">
      <div id="card-list"></div>
    </div>
  </div>

  <!-- REVIEW VIEW -->
  <div class="view" id="view-review">
    <div class="review-wrap">
      <span class="back-link" onclick="exitReview()">← Exit review</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="flashcard" id="flashcard" onclick="flipCard()"></div>
      <div class="hint" id="flip-hint">Tap the card to reveal the answer</div>
      <div id="grade-area" style="display:none;">
        <div class="grade-row">
          <button class="grade-btn grade-again" onclick="gradeCard(0)">Again<small>&lt;1 day</small></button>
          <button class="grade-btn grade-hard" onclick="gradeCard(1)">Hard<small>~2 days</small></button>
          <button class="grade-btn grade-good" onclick="gradeCard(2)">Good<small>~4 days</small></button>
          <button class="grade-btn grade-easy" onclick="gradeCard(3)">Easy<small>~7+ days</small></button>
        </div>
      </div>
    </div>
  </div>

  <!-- REVIEW DONE -->
  <div class="view" id="view-done">
    <div class="empty-state">
      <h3>🎉 Session complete</h3>
      <p id="done-summary"></p>
      <button class="btn gold" onclick="showTab('decks')" style="margin-top:10px;">Back to Decks</button>
    </div>
  </div>

  <!-- STATS VIEW -->
  <div class="view" id="view-stats">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card-panel">
      <h3 style="color:var(--gold);margin-top:0;">By Deck</h3>
      <div id="stats-deck-list"></div>
    </div>
  </div>

</main>

<!-- Add/Edit Card Modal -->
<div class="modal-bg" id="card-modal">
  <div class="modal">
    <h3 id="modal-title">Add Card</h3>
    <label>Front (question)</label>
    <textarea id="card-front" rows="3" placeholder="e.g. What does IDisposable do in C#?"></textarea>
    <label>Back (answer)</label>
    <textarea id="card-back" rows="3" placeholder="e.g. Provides a mechanism for releasing unmanaged resources..."></textarea>
    <div class="btn-row">
      <button class="btn gold" onclick="saveCard()">Save</button>
      <button class="btn ghost" onclick="closeCardModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
/* ---------- Data layer ---------- */
const STORAGE_KEY = 'flashcard_app_data_v1';

function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try { return JSON.parse(raw); } catch(e){ /* fall through */ }
  }
  return { decks: [] };
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = loadData();
let currentDeckId = null;
let editingCardId = null;
let reviewQueue = [];
let reviewIndex = 0;
let reviewCorrectCount = 0;
let flipped = false;

/* ---------- Utility ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function addDays(dateStr, days){
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function isDue(card){
  return !card.due || card.due <= todayISO();
}

/* ---------- Simplified SM-2 style scheduling ---------- */
function scheduleCard(card, grade){
  // grade: 0 again, 1 hard, 2 good, 3 easy
  if(card.ease === undefined) card.ease = 2.5;
  if(card.interval === undefined) card.interval = 0;
  if(card.reps === undefined) card.reps = 0;

  if(grade === 0){
    card.reps = 0;
    card.interval = 0;
    card.ease = Math.max(1.3, card.ease - 0.2);
    card.due = todayISO(); // due again today (short-term relearn)
  } else {
    card.reps += 1;
    if(grade === 1){
      card.ease = Math.max(1.3, card.ease - 0.15);
      card.interval = card.reps === 1 ? 1 : Math.round(card.interval * 1.2) || 1;
    } else if(grade === 2){
      card.interval = card.reps === 1 ? 3 : Math.round(card.interval * card.ease) || 3;
    } else if(grade === 3){
      card.ease = card.ease + 0.15;
      card.interval = card.reps === 1 ? 5 : Math.round(card.interval * card.ease * 1.3) || 5;
    }
    card.interval = Math.max(1, card.interval);
    card.due = addDays(todayISO(), card.interval);
  }
  card.lastReviewed = todayISO();
}

/* ---------- Navigation ---------- */
function showTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(tab==='decks'){
    document.getElementById('view-decks').classList.add('active');
    document.querySelector('.tab[data-tab="decks"]').classList.add('active');
    renderDecks();
  } else if(tab==='stats'){
    document.getElementById('view-stats').classList.add('active');
    document.querySelector('.tab[data-tab="stats"]').classList.add('active');
    renderStats();
  }
}
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>showTab(t.dataset.tab));
});

function showDeckDetail(deckId){
  currentDeckId = deckId;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-deck-detail').classList.add('active');
  renderDeckDetail();
}

/* ---------- Decks ---------- */
function createDeck(){
  const nameInput = document.getElementById('new-deck-name');
  const name = nameInput.value.trim();
  if(!name) return;
  data.decks.push({ id: uid(), name, cards: [] });
  nameInput.value = '';
  saveData();
  renderDecks();
}

function deleteDeck(id, evt){
  evt.stopPropagation();
  if(!confirm('Delete this deck and all its cards?')) return;
  data.decks = data.decks.filter(d=>d.id!==id);
  saveData();
  renderDecks();
}

function renderDecks(){
  const list = document.getElementById('deck-list');
  if(data.decks.length===0){
    list.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <h3>No decks yet</h3>
      <p>Create a deck above to start building your flashcards.</p>
    </div>`;
    return;
  }
  list.innerHTML = data.decks.map(deck=>{
    const dueCount = deck.cards.filter(isDue).length;
    return `
    <div class="deck-card" onclick="showDeckDetail('${deck.id}')">
      <div class="deck-actions">
        <button class="icon-btn" onclick="deleteDeck('${deck.id}', event)" title="Delete deck">🗑</button>
      </div>
      <div class="deck-name">${escapeHtml(deck.name)}</div>
      <div class="deck-meta">${deck.cards.length} card${deck.cards.length!==1?'s':''}</div>
      <span class="deck-due ${dueCount===0?'zero':''}">${dueCount} due today</span>
    </div>`;
  }).join('');
}

function renderDeckDetail(){
  const deck = data.decks.find(d=>d.id===currentDeckId);
  if(!deck) { showTab('decks'); return; }
  document.getElementById('detail-deck-name').textContent = deck.name;
  const listEl = document.getElementById('card-list');
  if(deck.cards.length===0){
    listEl.innerHTML = `<div class="empty-state"><p>No cards yet. Click "+ Add Card" to create your first one.</p></div>`;
    return;
  }
  listEl.innerHTML = deck.cards.map(c=>`
    <div class="card-row">
      <div class="card-text">
        <div class="front">${escapeHtml(c.front)}</div>
        <div class="back">${escapeHtml(c.back)}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;">
        <button class="icon-btn" onclick="openCardModal('${c.id}')" title="Edit">✏️</button>
        <button class="icon-btn" onclick="deleteCard('${c.id}')" title="Delete">🗑</button>
      </div>
    </div>
  `).join('');
}

/* ---------- Cards ---------- */
function openCardModal(cardId){
  editingCardId = cardId || null;
  const deck = data.decks.find(d=>d.id===currentDeckId);
  if(cardId){
    const card = deck.cards.find(c=>c.id===cardId);
    document.getElementById('modal-title').textContent = 'Edit Card';
    document.getElementById('card-front').value = card.front;
    document.getElementById('card-back').value = card.back;
  } else {
    document.getElementById('modal-title').textContent = 'Add Card';
    document.getElementById('card-front').value = '';
    document.getElementById('card-back').value = '';
  }
  document.getElementById('card-modal').classList.add('active');
}
function closeCardModal(){
  document.getElementById('card-modal').classList.remove('active');
}
function saveCard(){
  const front = document.getElementById('card-front').value.trim();
  const back = document.getElementById('card-back').value.trim();
  if(!front || !back){ alert('Please fill in both front and back.'); return; }
  const deck = data.decks.find(d=>d.id===currentDeckId);
  if(editingCardId){
    const card = deck.cards.find(c=>c.id===editingCardId);
    card.front = front;
    card.back = back;
  } else {
    deck.cards.push({ id: uid(), front, back, due: todayISO(), interval:0, ease:2.5, reps:0 });
  }
  saveData();
  closeCardModal();
  renderDeckDetail();
}
function deleteCard(cardId){
  if(!confirm('Delete this card?')) return;
  const deck = data.decks.find(d=>d.id===currentDeckId);
  deck.cards = deck.cards.filter(c=>c.id!==cardId);
  saveData();
  renderDeckDetail();
}

/* ---------- Review session ---------- */
function startReview(){
  const deck = data.decks.find(d=>d.id===currentDeckId);
  reviewQueue = deck.cards.filter(isDue);
  if(reviewQueue.length===0){
    alert('No cards due for review right now. Great job staying on top of it!');
    return;
  }
  reviewIndex = 0;
  reviewCorrectCount = 0;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-review').classList.add('active');
  renderReviewCard();
}
function exitReview(){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-deck-detail').classList.add('active');
  renderDeckDetail();
}
function renderReviewCard(){
  flipped = false;
  const card = reviewQueue[reviewIndex];
  document.getElementById('flashcard').textContent = card.front;
  document.getElementById('grade-area').style.display = 'none';
  document.getElementById('flip-hint').style.display = 'block';
  const pct = Math.round((reviewIndex / reviewQueue.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
}
function flipCard(){
  const card = reviewQueue[reviewIndex];
  if(!flipped){
    document.getElementById('flashcard').textContent = card.back;
    document.getElementById('grade-area').style.display = 'block';
    document.getElementById('flip-hint').style.display = 'none';
    flipped = true;
  }
}
function gradeCard(grade){
  const card = reviewQueue[reviewIndex];
  scheduleCard(card, grade);
  saveData();
  reviewIndex++;
  if(reviewIndex >= reviewQueue.length){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-done').classList.add('active');
    document.getElementById('done-summary').textContent =
      `You reviewed ${reviewQueue.length} card${reviewQueue.length!==1?'s':''} in this session.`;
  } else {
    renderReviewCard();
  }
}

/* ---------- Stats ---------- */
function renderStats(){
  let totalCards = 0, totalDue = 0, totalDecks = data.decks.length;
  let reviewedEver = 0;
  data.decks.forEach(d=>{
    totalCards += d.cards.length;
    totalDue += d.cards.filter(isDue).length;
    reviewedEver += d.cards.filter(c=>c.reps>0).length;
  });
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-box"><div class="stat-num">${totalDecks}</div><div class="stat-label">Decks</div></div>
    <div class="stat-box"><div class="stat-num">${totalCards}</div><div class="stat-label">Total Cards</div></div>
    <div class="stat-box"><div class="stat-num">${totalDue}</div><div class="stat-label">Due Today</div></div>
    <div class="stat-box"><div class="stat-num">${reviewedEver}</div><div class="stat-label">Cards Studied</div></div>
  `;
  const deckListEl = document.getElementById('stats-deck-list');
  if(data.decks.length===0){
    deckListEl.innerHTML = '<p style="color:var(--text-dim);">No decks yet.</p>';
    return;
  }
  deckListEl.innerHTML = data.decks.map(d=>{
    const due = d.cards.filter(isDue).length;
    return `<div class="card-row">
      <div class="card-text"><div class="front">${escapeHtml(d.name)}</div>
      <div class="back">${d.cards.length} cards</div></div>
      <span class="deck-due ${due===0?'zero':''}">${due} due</span>
    </div>`;
  }).join('');
}

/* ---------- Helpers ---------- */
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---------- Init ---------- */
renderDecks();
</script>

</body>
</html>
