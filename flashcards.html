<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Composer — AIM Builder</title>
<style>
  :root{
    --bg:#0c2426;
    --panel:#123b3d;
    --panel-2:#0f3234;
    --border:#1e5254;
    --gold:#d4af37;
    --gold-dim:#a98a2c;
    --text:#eaf2f1;
    --text-dim:#9fc0bd;
    --danger:#c0524a;
    --success:#4a9e7a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:linear-gradient(160deg, var(--bg), #081a1b);
    color:var(--text);
    min-height:100vh;
    padding:24px 16px 60px;
  }
  .wrap{max-width:1100px;margin:0 auto;}
  header{text-align:center;margin-bottom:28px;}
  header h1{
    font-size:1.8rem;margin:0 0 4px;color:var(--gold);
    letter-spacing:0.5px;
  }
  header p{color:var(--text-dim);margin:0;font-size:0.95rem;}

  .grid{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
  @media (max-width:860px){.grid{grid-template-columns:1fr;}}

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
  }
  .card h2{
    margin:0 0 16px;font-size:1.05rem;color:var(--gold);
    border-bottom:1px solid var(--border);padding-bottom:10px;
  }
  label{display:block;font-size:0.85rem;color:var(--text-dim);margin-bottom:6px;margin-top:14px;}
  label:first-of-type{margin-top:0;}
  input[type=text], textarea{
    width:100%;padding:10px 12px;background:var(--panel-2);
    border:1px solid var(--border);border-radius:8px;color:var(--text);
    font-family:inherit;font-size:0.92rem;resize:vertical;
  }
  input[type=text]:focus, textarea:focus{
    outline:none;border-color:var(--gold-dim);
  }
  textarea{min-height:70px;line-height:1.4;}

  .role-wrap{position:relative;}
  .autocomplete-list{
    position:absolute;top:100%;left:0;right:0;
    background:var(--panel-2);border:1px solid var(--border);
    border-top:none;border-radius:0 0 8px 8px;
    max-height:180px;overflow-y:auto;z-index:20;display:none;
  }
  .autocomplete-list div{
    padding:8px 12px;cursor:pointer;font-size:0.88rem;color:var(--text);
  }
  .autocomplete-list div:hover, .autocomplete-list div.active{
    background:var(--border);
  }

  .btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  button{
    border:none;border-radius:8px;padding:10px 16px;font-size:0.88rem;
    cursor:pointer;font-weight:600;transition:transform .12s, opacity .12s;
  }
  button:active{transform:scale(0.97);}
  .btn-primary{background:var(--gold);color:#0c2426;}
  .btn-primary:hover{opacity:0.9;}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-secondary:hover{border-color:var(--gold-dim);color:var(--gold);}
  .btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
  .btn-danger:hover{background:var(--danger);color:var(--text);}

  .list-item{
    background:var(--panel-2);border:1px solid var(--border);
    border-radius:8px;padding:10px 12px;margin-bottom:8px;
    cursor:pointer;display:flex;justify-content:space-between;align-items:center;
    gap:8px;transition:border-color .15s;
  }
  .list-item:hover{border-color:var(--gold-dim);}
  .list-item .meta{flex:1;min-width:0;}
  .list-item .name{font-weight:600;font-size:0.9rem;color:var(--text);}
  .list-item .preview{
    font-size:0.78rem;color:var(--text-dim);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;margin-top:2px;
  }
  .list-item .del{
    background:none;border:none;color:var(--text-dim);font-size:1rem;
    padding:2px 6px;line-height:1;
  }
  .list-item .del:hover{color:var(--danger);}
  .empty-note{color:var(--text-dim);font-size:0.85rem;font-style:italic;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:#0c2426;padding:10px 20px;border-radius:8px;
    font-size:0.88rem;font-weight:600;opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;z-index:100;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .badge{
    font-size:0.72rem;background:var(--gold);color:#0c2426;
    padding:2px 8px;border-radius:20px;font-weight:700;margin-left:8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Prompt Composer</h1>
    <p>Build, save, and reuse Role · Context · Task · Format prompts</p>
  </header>

  <div class="grid">
    <!-- LEFT: FORM -->
    <div class="card">
      <h2 id="formTitle">Compose Prompt</h2>

      <label for="name">Prompt Name (for saving)</label>
      <input type="text" id="name" placeholder="e.g. Oracle migration validation">

      <label for="role">Role</label>
      <div class="role-wrap">
        <input type="text" id="role" autocomplete="off" placeholder="e.g. Senior Oracle PL/SQL Developer">
        <div class="autocomplete-list" id="roleAC"></div>
      </div>

      <label for="context">Context</label>
      <textarea id="context" placeholder="Stack, constraints, existing patterns Claude needs to know..."></textarea>

      <label for="task">Task</label>
      <textarea id="task" placeholder="The specific, bounded ask..."></textarea>

      <label for="format">Format (optional)</label>
      <textarea id="format" placeholder="e.g. Code block first, then numbered steps. No long paragraphs."></textarea>

      <div class="btn-row">
        <button class="btn-primary" onclick="savePrompt()">💾 Save</button>
        <button class="btn-secondary" onclick="copyPrompt()">📋 Copy to Clipboard</button>
        <button class="btn-secondary" onclick="newPrompt()">＋ New / Clear</button>
      </div>
    </div>

    <!-- RIGHT: LISTS -->
    <div>
      <div class="card">
        <h2>Saved Prompts <span class="badge" id="savedCount">0</span></h2>
        <div id="savedList"></div>
      </div>

      <div class="card">
        <h2>Sample Prompts</h2>
        <div id="sampleList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'promptComposer_savedPrompts';

const ROLE_SUGGESTIONS = [
  "Senior .NET Developer",
  "ASP.NET Core Architect",
  "Oracle PL/SQL Expert",
  "SQL Server DBA",
  "Crystal Reports Developer",
  "Kendo UI Specialist",
  "Entity Framework Expert",
  "Database Migration Specialist",
  "Code Reviewer",
  "QA / Test Engineer",
  "Frontend Developer (jQuery/Bootstrap)",
  "Solutions Architect",
  "Technical Writer",
  "DevOps / Azure DevOps Engineer",
  "REST API Designer",
  "Performance Optimization Specialist",
  "Security / Code Audit Reviewer"
];

const SAMPLE_PROMPTS = [
  {
    name: "Oracle migration edge-case validation",
    role: "Senior Oracle PL/SQL Developer",
    context: "Migrating quotation records from a legacy schema into VENTURE.QUOTATION_HEADER using staging tables and PRAGMA AUTONOMOUS_TRANSACTION for error logging. Existing helper function: fn_calc_edate.",
    task: "Walk through step by step what could go wrong migrating rows where AGREEMENT_ID is null but STATUS = 'APPROVED', then write the validation procedure.",
    format: "SQL in a code block first, then a short explanation of the edge cases handled."
  },
  {
    name: "Crystal Reports grouped report design",
    role: "Crystal Reports + Oracle Developer",
    context: "Existing grouped invoice report uses VENTURE.INVOICE_GROUP_PRINT_VIEW with subtotals per customer and a grand total footer. New report must match this style exactly.",
    task: "Design an Oracle view and Crystal Reports group structure for overdue PDC collections, grouped by customer with subtotals by cheque status.",
    format: "SQL first in a code block, then a numbered list of Crystal Reports design steps. No long paragraphs."
  },
  {
    name: "Kendo Grid column batch generation",
    role: "Kendo UI Specialist",
    context: "Existing column style: { field: \"InvoiceNo\", title: \"Invoice #\", width: 120, filterable: true }",
    task: "Generate columns in this exact style for: CustomerName, InvoiceDate, TotalAmount (currency), Status (dropdown filter).",
    format: "JS array only, no explanation needed."
  },
  {
    name: "EF Core soft-delete pattern",
    role: "ASP.NET Core Architect",
    context: "ASP.NET Core 8, EF Core, Identity already scaffolded. Document entity exists with standard CRUD.",
    task: "Add a soft-delete pattern to the Document entity: IsDeleted flag, global query filter, and a repository method to restore soft-deleted records.",
    format: "Code changes only, organized by file."
  },
  {
    name: "Conventional commit message",
    role: "Technical Writer",
    context: "Change involves the bulk upload staging layer for ASoft AMS.",
    task: "Write this as a Conventional Commits message describing the change.",
    format: "One-line summary (max 72 chars), blank line, then 2-3 bullet points."
  }
];

let currentEditId = null; // null = new/unsaved, otherwise id of saved prompt being edited

function loadSaved(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){
    console.error('Failed to load saved prompts', e);
    return [];
  }
}

function persistSaved(list){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }catch(e){
    console.error('Failed to save', e);
    showToast('⚠️ Could not save (storage error)');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove('show'), 2200);
}

function getFormValues(){
  return {
    name: document.getElementById('name').value.trim(),
    role: document.getElementById('role').value.trim(),
    context: document.getElementById('context').value.trim(),
    task: document.getElementById('task').value.trim(),
    format: document.getElementById('format').value.trim()
  };
}

function setFormValues(p){
  document.getElementById('name').value = p.name || '';
  document.getElementById('role').value = p.role || '';
  document.getElementById('context').value = p.context || '';
  document.getElementById('task').value = p.task || '';
  document.getElementById('format').value = p.format || '';
}

function newPrompt(){
  currentEditId = null;
  setFormValues({});
  document.getElementById('formTitle').textContent = 'Compose Prompt';
  document.getElementById('name').focus();
}

function savePrompt(){
  const vals = getFormValues();
  if(!vals.role || !vals.context || !vals.task){
    showToast('⚠️ Role, Context, and Task are required');
    return;
  }
  if(!vals.name){
    vals.name = vals.task.slice(0, 40) + (vals.task.length > 40 ? '...' : '');
  }

  let list = loadSaved();

  if(currentEditId){
    const idx = list.findIndex(p => p.id === currentEditId);
    if(idx > -1){
      list[idx] = {...list[idx], ...vals, updatedAt: Date.now()};
    }else{
      currentEditId = null;
    }
  }

  if(!currentEditId){
    const newItem = {
      id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      ...vals,
      updatedAt: Date.now()
    };
    list.unshift(newItem);
    currentEditId = newItem.id;
  }

  persistSaved(list);
  renderSavedList();
  showToast('✅ Prompt saved');
  document.getElementById('formTitle').innerHTML = 'Compose Prompt <span class="badge">editing saved</span>';
}

function deletePrompt(id, evt){
  evt.stopPropagation();
  if(!confirm('Delete this saved prompt?')) return;
  let list = loadSaved();
  list = list.filter(p => p.id !== id);
  persistSaved(list);
  if(currentEditId === id){
    newPrompt();
  }
  renderSavedList();
  showToast('🗑️ Deleted');
}

function loadIntoForm(p, isSaved){
  setFormValues(p);
  currentEditId = isSaved ? p.id : null;
  document.getElementById('formTitle').innerHTML = isSaved
    ? 'Compose Prompt <span class="badge">editing saved</span>'
    : 'Compose Prompt <span class="badge">from sample</span>';
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderSavedList(){
  const list = loadSaved();
  const container = document.getElementById('savedList');
  document.getElementById('savedCount').textContent = list.length;

  if(list.length === 0){
    container.innerHTML = '<div class="empty-note">No saved prompts yet. Compose one and hit Save.</div>';
    return;
  }

  container.innerHTML = '';
  list.sort((a,b)=> b.updatedAt - a.updatedAt).forEach(p => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.onclick = () => loadIntoForm(p, true);
    div.innerHTML = `
      <div class="meta">
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="preview">${escapeHtml(p.role)} — ${escapeHtml(p.task)}</div>
      </div>
      <button class="del" title="Delete">✕</button>
    `;
    div.querySelector('.del').onclick = (e) => deletePrompt(p.id, e);
    container.appendChild(div);
  });
}

function renderSampleList(){
  const container = document.getElementById('sampleList');
  container.innerHTML = '';
  SAMPLE_PROMPTS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.onclick = () => loadIntoForm(p, false);
    div.innerHTML = `
      <div class="meta">
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="preview">${escapeHtml(p.role)}</div>
      </div>
    `;
    container.appendChild(div);
  });
}

function copyPrompt(){
  const vals = getFormValues();
  if(!vals.role && !vals.context && !vals.task){
    showToast('⚠️ Nothing to copy yet');
    return;
  }
  let lines = [];
  lines.push(`Role: ${vals.role}`);
  lines.push(`Context: ${vals.context}`);
  lines.push(`Task: ${vals.task}`);
  if(vals.format){
    lines.push(`Format: ${vals.format}`);
  }
  const text = lines.join('\n');

  navigator.clipboard.writeText(text).then(()=>{
    showToast('📋 Copied as key: value');
  }).catch(()=>{
    // fallback for older/blocked clipboard API
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try{
      document.execCommand('copy');
      showToast('📋 Copied as key: value');
    }catch(e){
      showToast('⚠️ Copy failed — select and copy manually');
    }
    document.body.removeChild(ta);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ---- Role autocomplete ----
const roleInput = document.getElementById('role');
const roleAC = document.getElementById('roleAC');
let acActiveIndex = -1;

roleInput.addEventListener('input', () => {
  const val = roleInput.value.trim().toLowerCase();
  acActiveIndex = -1;
  if(!val){
    roleAC.style.display = 'none';
    return;
  }
  const matches = ROLE_SUGGESTIONS.filter(r => r.toLowerCase().includes(val));
  if(matches.length === 0){
    roleAC.style.display = 'none';
    return;
  }
  roleAC.innerHTML = '';
  matches.forEach(m => {
    const item = document.createElement('div');
    item.textContent = m;
    item.onclick = () => {
      roleInput.value = m;
      roleAC.style.display = 'none';
    };
    roleAC.appendChild(item);
  });
  roleAC.style.display = 'block';
});

roleInput.addEventListener('keydown', (e) => {
  const items = roleAC.querySelectorAll('div');
  if(roleAC.style.display !== 'block' || items.length === 0) return;

  if(e.key === 'ArrowDown'){
    e.preventDefault();
    acActiveIndex = Math.min(acActiveIndex + 1, items.length - 1);
    updateActiveItem(items);
  }else if(e.key === 'ArrowUp'){
    e.preventDefault();
    acActiveIndex = Math.max(acActiveIndex - 1, 0);
    updateActiveItem(items);
  }else if(e.key === 'Enter'){
    if(acActiveIndex > -1){
      e.preventDefault();
      roleInput.value = items[acActiveIndex].textContent;
      roleAC.style.display = 'none';
    }
  }else if(e.key === 'Escape'){
    roleAC.style.display = 'none';
  }
});

function updateActiveItem(items){
  items.forEach((it, i) => it.classList.toggle('active', i === acActiveIndex));
  if(acActiveIndex > -1) items[acActiveIndex].scrollIntoView({block:'nearest'});
}

document.addEventListener('click', (e) => {
  if(!roleInput.contains(e.target) && !roleAC.contains(e.target)){
    roleAC.style.display = 'none';
  }
});

// ---- Init ----
renderSavedList();
renderSampleList();
</script>
</body>
</html>
