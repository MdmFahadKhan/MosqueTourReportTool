<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solution Explorer — Skillset.sln</title>
<style>
  :root{
    --bg: #1e1e1e;
    --panel: #252526;
    --panel-2: #2d2d30;
    --line: #3c3c3c;
    --text: #d4d4d4;
    --text-dim: #8a8a8a;
    --accent: #a277ff;
    --accent-dim: #68217a;
    --ok: #4ec9b0;
    --warn: #ce9178;
    --folder: #dcb67a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family: Consolas, 'SF Mono', 'Courier New', monospace;
    min-height:100vh;
  }
  .titlebar{
    background:var(--panel-2);
    border-bottom:1px solid var(--line);
    padding:10px 18px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:var(--text-dim);
  }
  .titlebar .dot{width:11px;height:11px;border-radius:50%;}
  .dot.r{background:#ff5f57;} .dot.y{background:#febc2e;} .dot.g{background:#28c840;}
  .titlebar .name{margin-left:8px;}
  .titlebar .name b{color:var(--text);}

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:28px 20px 60px;
  }

  .solution-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:6px;
  }
  .solution-header h1{
    font-size:18px;
    font-weight:600;
    margin:0;
    color:var(--text);
  }
  .solution-header h1 .ico{color:var(--folder);margin-right:8px;}
  .subtitle{color:var(--text-dim); font-size:12.5px; margin:0 0 20px;}

  .overall{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    padding:14px 16px;
    margin-bottom:22px;
  }
  .overall-top{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    color:var(--text-dim);
    margin-bottom:8px;
  }
  .overall-top b{color:var(--accent); font-weight:600;}
  .bar{
    height:8px;
    background:var(--line);
    border-radius:4px;
    overflow:hidden;
  }
  .bar > div{
    height:100%;
    background:linear-gradient(90deg, var(--accent-dim), var(--accent));
    transition:width .35s ease;
  }

  .project{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    margin-bottom:12px;
    overflow:hidden;
  }
  .project-header{
    display:flex;
    align-items:center;
    gap:8px;
    padding:11px 14px;
    cursor:pointer;
    user-select:none;
    background:var(--panel-2);
    border-bottom:1px solid var(--line);
  }
  .project-header:hover{background:#333336;}
  .caret{
    color:var(--text-dim);
    font-size:11px;
    width:10px;
    transition:transform .15s ease;
  }
  .project.collapsed .caret{transform:rotate(-90deg);}
  .project.collapsed .items{display:none;}
  .proj-icon{color:var(--folder);}
  .proj-name{flex:1; font-size:13.5px; font-weight:600;}
  .proj-count{font-size:11.5px; color:var(--text-dim); font-variant-numeric:tabular-nums;}
  .proj-bar{
    width:64px;
    height:5px;
    background:var(--line);
    border-radius:3px;
    overflow:hidden;
  }
  .proj-bar > div{height:100%; background:var(--ok);}

  .items{padding:6px 8px;}
  .item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:7px 10px;
    border-radius:3px;
    font-size:13px;
  }
  .item:hover{background:var(--panel-2);}
  .item input{
    accent-color: var(--accent);
    width:15px; height:15px;
    cursor:pointer;
    flex-shrink:0;
  }
  .item label{
    cursor:pointer;
    flex:1;
  }
  .item.done label{
    color:var(--text-dim);
    text-decoration:line-through;
    text-decoration-color:var(--ok);
  }
  .item .file-ico{color:var(--text-dim); font-size:12px;}

  .footer-note{
    color:var(--text-dim);
    font-size:11.5px;
    text-align:center;
    margin-top:24px;
  }
  .reset-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:inherit;
    font-size:11.5px;
    padding:5px 10px;
    border-radius:3px;
    cursor:pointer;
  }
  .reset-btn:hover{border-color:var(--warn); color:var(--warn);}

  .statusbar{
    position:sticky;
    bottom:0;
    background:var(--accent-dim);
    color:#f0e8ff;
    font-size:11.5px;
    padding:6px 18px;
    display:flex;
    justify-content:space-between;
  }
</style>
</head>
<body>

  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="name">Solution Explorer — <b>Skillset.sln</b></span>
  </div>

  <div class="wrap">
    <div class="solution-header">
      <h1><span class="ico">📁</span>Fahad — Skillset Checklist</h1>
    </div>
    <p class="subtitle">Same tracker pattern as the other checklist tools — tick what you're confident applying on the job today. Progress saves automatically in this browser.</p>

    <div class="overall">
      <div class="overall-top">
        <span>OVERALL COMPLETION</span>
        <span><b id="overallPct">0%</b> — <span id="overallCount">0/0</span></span>
      </div>
      <div class="bar"><div id="overallBar" style="width:0%"></div></div>
    </div>

    <div id="projects"></div>

    <div class="footer-note">
      <button class="reset-btn" id="resetBtn">Reset all checkmarks</button>
    </div>
  </div>

  <div class="statusbar">
    <span>Ln — Skillset.sln</span>
    <span id="statusRight">0 items checked</span>
  </div>

<script>
const DATA = [
  { name: "Programming", items: ["C#.NET", "ASP.NET MVC", "Web Services", "RESTful API", "Entity Framework (EF)"] },
  { name: "Frameworks", items: [".NET Framework 4.X", ".NET Core (Learning / know basics)"] },
  { name: "Web Technologies", items: ["HTML5", "CSS3", "JavaScript", "Bootstrap", "jQuery", "AngularJS", "Kendo UI"] },
  { name: "Database", items: ["SQL Server – RDBMS", "Oracle SQL", "PL/SQL"] },
  { name: "Testing & Tools", items: ["Postman", "Debugging", "Documentation", "GitHub"] },
  { name: "Reporting", items: ["SAP Crystal Reports 9", "SAP Crystal Reports 2016"] },
  { name: "Other Skills", items: ["Problem-solving", "Attention to detail", "Self-motivation", "Ability to work independently"] }
];

const STORAGE_KEY = "fahad_skill_checklist_v1";

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveState(state){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error("Could not save checklist state", e); }
}

let state = loadState();

function keyFor(projIdx, itemIdx){ return projIdx + "_" + itemIdx; }

const projectsEl = document.getElementById("projects");

function render(){
  projectsEl.innerHTML = "";
  let totalItems = 0, totalDone = 0;

  DATA.forEach((proj, pIdx) => {
    const projDiv = document.createElement("div");
    projDiv.className = "project";

    const doneCount = proj.items.filter((_, iIdx) => state[keyFor(pIdx,iIdx)]).length;
    totalItems += proj.items.length;
    totalDone += doneCount;
    const pct = Math.round((doneCount / proj.items.length) * 100);

    const header = document.createElement("div");
    header.className = "project-header";
    header.innerHTML = `
      <span class="caret">▾</span>
      <span class="proj-icon">📁</span>
      <span class="proj-name">${proj.name}</span>
      <span class="proj-count">${doneCount}/${proj.items.length}</span>
      <span class="proj-bar"><div style="width:${pct}%"></div></span>
    `;
    header.addEventListener("click", () => {
      projDiv.classList.toggle("collapsed");
    });

    const itemsDiv = document.createElement("div");
    itemsDiv.className = "items";

    proj.items.forEach((itemName, iIdx) => {
      const k = keyFor(pIdx, iIdx);
      const checked = !!state[k];
      const row = document.createElement("div");
      row.className = "item" + (checked ? " done" : "");
      const id = "chk_" + k;
      row.innerHTML = `
        <input type="checkbox" id="${id}" ${checked ? "checked" : ""}>
        <span class="file-ico">📄</span>
        <label for="${id}">${itemName}</label>
      `;
      const checkbox = row.querySelector("input");
      checkbox.addEventListener("change", () => {
        state[k] = checkbox.checked;
        saveState(state);
        render();
      });
      itemsDiv.appendChild(row);
    });

    projDiv.appendChild(header);
    projDiv.appendChild(itemsDiv);
    projectsEl.appendChild(projDiv);
  });

  const overallPct = totalItems ? Math.round((totalDone / totalItems) * 100) : 0;
  document.getElementById("overallPct").textContent = overallPct + "%";
  document.getElementById("overallCount").textContent = totalDone + "/" + totalItems;
  document.getElementById("overallBar").style.width = overallPct + "%";
  document.getElementById("statusRight").textContent = totalDone + " of " + totalItems + " items checked";
}

document.getElementById("resetBtn").addEventListener("click", () => {
  if(confirm("Clear all checkmarks? This can't be undone.")){
    state = {};
    saveState(state);
    render();
  }
});

render();
</script>
</body>
</html>
