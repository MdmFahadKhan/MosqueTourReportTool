<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="menu.css">
  
<title>Marker — Bookmark Dashboard</title>
<meta name="description" content="A fast bookmark dashboard for your most-used links. All data stays on your device." />
<meta name="theme-color" content="#10151F" />

<style>
/* ==========================================================================
   styles.css
   Design language: "control tower for your links."
   A calm instrument panel, not a toy. Cards are literal ribbon bookmarks
   (notched bottom edge) — the one signature motif the whole UI is built
   around. Everything else stays quiet so that motif reads clearly.
   ========================================================================== */

/* ---------------------------------------------------------------------- */
/* Design tokens                                                          */
/* ---------------------------------------------------------------------- */

:root {
  /* Surfaces (light) */
  --bg: #F6F5F1;
  --bg-raised: #FFFFFF;
  --bg-sunken: #ECEAE4;
  --border: rgba(15, 23, 42, 0.10);
  --border-strong: rgba(15, 23, 42, 0.18);

  /* Text (light) */
  --text: #1B1F2A;
  --text-muted: #5B6272;
  --text-faint: #8B90A0;

  /* Brand */
  --accent: #3457D5;
  --accent-strong: #2A46B4;
  --accent-soft: rgba(52, 87, 213, 0.12);
  --amber: #F2A93B;
  --amber-soft: rgba(242, 169, 59, 0.16);
  --danger: #D5433F;
  --danger-soft: rgba(213, 67, 63, 0.12);

  /* Category hues */
  --cat-general: #64748B;
  --cat-spiritual: #2F9E7A;
  --cat-health: #E0556F;
  --cat-study: #7C5CFC;
  --cat-work: #DE9420;
  --cat-other: #8A8F98;

  /* Type */
  --font-display: -apple-system, "Segoe UI Semibold", "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-body: -apple-system, "Segoe UI", "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, "Roboto Mono", monospace;

  /* Scale */
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
  --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.10);
  --shadow-lg: 0 20px 48px rgba(15, 23, 42, 0.18);

  --header-h: 68px;
  --transition-fast: 140ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-med: 240ms cubic-bezier(0.4, 0, 0.2, 1);

  color-scheme: light;
}

[data-theme='dark'] {
  --bg: #0E1320;
  --bg-raised: #171E2B;
  --bg-sunken: #0A0E17;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.16);

  --text: #E8EAF0;
  --text-muted: #9AA2B4;
  --text-faint: #6B7284;

  --accent: #6C8CFF;
  --accent-strong: #8AA2FF;
  --accent-soft: rgba(108, 140, 255, 0.16);
  --amber: #F5B95B;
  --amber-soft: rgba(245, 185, 91, 0.14);
  --danger: #EF6E6A;
  --danger-soft: rgba(239, 110, 106, 0.14);

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 24px 56px rgba(0, 0, 0, 0.55);

  color-scheme: dark;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

/* ---------------------------------------------------------------------- */
/* Reset + base                                                           */
/* ---------------------------------------------------------------------- */

*, *::before, *::after { box-sizing: border-box; }

/* Guarantees the native `hidden` attribute always wins, even against
   components (like .confirm-dialog, .editor-panel) that set their own
   `display` value. Without this, a same-specificity clash meant elements
   could render even while `hidden` was correctly set by JS. */
[hidden] { display: none !important; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition-med), color var(--transition-med);
}

body.no-scroll { overflow: hidden; }

h1, h2, h3 { font-family: var(--font-display); margin: 0; }

button, input, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

button { cursor: pointer; }

a { color: var(--accent); }

.visually-hidden {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

.skip-link {
  position: absolute;
  left: 12px;
  top: -48px;
  background: var(--accent);
  color: #fff;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  z-index: 200;
  transition: top var(--transition-fast);
}
.skip-link:focus { top: 12px; }

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}

/* ---------------------------------------------------------------------- */
/* Header                                                                 */
/* ---------------------------------------------------------------------- */

.app-header {
  position: sticky;
  top: 0;
  z-index: 40;
  display: flex;
  align-items: center;
  gap: 16px;
  height: var(--header-h);
  padding: 0 20px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
  backdrop-filter: saturate(1.4) blur(8px);
}

.app-header__brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.app-header__mark {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  background: linear-gradient(160deg, var(--accent), var(--accent-strong));
  position: relative;
  flex-shrink: 0;
}
.app-header__mark::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 22%;
  width: 8px;
  height: 13px;
  transform: translateX(-50%);
  background: var(--bg-raised);
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 78%, 0 100%);
}

.app-header__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -0.01em;
}

.app-header__search {
  flex: 1;
  max-width: 460px;
  position: relative;
  display: flex;
  align-items: center;
}

.app-header__search-icon {
  position: absolute;
  left: 14px;
  color: var(--text-faint);
  pointer-events: none;
  font-size: 1rem;
}

.app-header__search input {
  width: 100%;
  height: 42px;
  padding: 0 14px 0 38px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--bg-sunken);
  color: var(--text);
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.app-header__search input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.app-header__search input::placeholder { color: var(--text-faint); }

.app-header__actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

/* ---------------------------------------------------------------------- */
/* Buttons                                                                 */
/* ---------------------------------------------------------------------- */

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 42px;
  padding: 0 16px;
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  font-weight: 600;
  font-size: 0.9rem;
  transition: transform var(--transition-fast), background var(--transition-fast), border-color var(--transition-fast);
  min-height: 44px;
}
.btn:active { transform: scale(0.97); }

.btn--primary {
  background: var(--accent);
  color: #fff;
}
.btn--primary:hover { background: var(--accent-strong); }

.btn--ghost {
  background: transparent;
  border-color: var(--border-strong);
  color: var(--text);
}
.btn--ghost:hover { background: var(--bg-sunken); }

.btn--danger {
  background: var(--danger);
  color: #fff;
}
.btn--danger:hover { filter: brightness(1.08); }

.btn--small { height: 36px; padding: 0 12px; font-size: 0.82rem; min-height: 36px; }

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  min-width: 44px;
  min-height: 44px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-muted);
  transition: background var(--transition-fast), color var(--transition-fast);
}
.icon-btn:hover { background: var(--bg-sunken); color: var(--text); }
.icon-btn--lg { font-size: 1.1rem; }
.icon-btn--active { color: var(--amber); }
.icon-btn--danger:hover { color: var(--danger); background: var(--danger-soft); }

/* ---------------------------------------------------------------------- */
/* Main layout                                                            */
/* ---------------------------------------------------------------------- */

.app-main {
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px 20px 64px;
}

/* ---------------------------------------------------------------------- */
/* Stats bar                                                              */
/* ---------------------------------------------------------------------- */

.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  box-shadow: var(--shadow-sm);
}

.stat-card__icon { font-size: 1rem; margin-bottom: 2px; }
.stat-card__value { font-family: var(--font-display); font-weight: 700; font-size: 1.5rem; letter-spacing: -0.02em; }
.stat-card__label { font-size: 0.76rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }

.stat-card--primary .stat-card__value { color: var(--accent); }
.stat-card--pinned .stat-card__value { color: var(--amber); }

/* ---------------------------------------------------------------------- */
/* Chip row (category filters)                                            */
/* ---------------------------------------------------------------------- */

.chip-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 6px;
  margin-bottom: 14px;
  scrollbar-width: thin;
}
.chip-row::-webkit-scrollbar { height: 6px; }
.chip-row::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.chip {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 38px;
  padding: 0 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.86rem;
  transition: all var(--transition-fast);
  min-height: 44px;
}
.chip:hover { border-color: var(--border-strong); color: var(--text); }
.chip--active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
[data-theme='dark'] .chip--active { color: var(--accent-strong); }
.chip__icon { font-size: 0.95rem; }

/* ---------------------------------------------------------------------- */
/* Toolbar                                                                 */
/* ---------------------------------------------------------------------- */

.toolbar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 18px;
}

.toolbar__sort {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.toolbar__sort select {
  height: 36px;
  padding: 0 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text);
}

/* ---------------------------------------------------------------------- */
/* Category sections                                                      */
/* ---------------------------------------------------------------------- */

.sections { display: flex; flex-direction: column; gap: 10px; }

.category-section {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.category-section__header {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: transparent;
  border: none;
  text-align: left;
  font-weight: 700;
  font-family: var(--font-display);
}

.category-section__caret {
  font-size: 0.7rem;
  color: var(--text-faint);
  transition: transform var(--transition-fast);
  width: 12px;
}

.category-section__icon { font-size: 1.05rem; }
.category-section__title { flex: 1; letter-spacing: -0.01em; }

.category-section__count {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--bg-sunken);
  border-radius: 999px;
  padding: 2px 9px;
}

.category-section__body {
  padding: 4px 18px 18px;
  animation: reveal var(--transition-med) ease;
}

@keyframes reveal {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}

/* ---------------------------------------------------------------------- */
/* Bookmark card — the signature "ribbon" motif                           */
/* ---------------------------------------------------------------------- */

.card {
  position: relative;
  display: flex;
  gap: 12px;
  padding: 14px 14px 14px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
}

.card:hover, .card:focus-within {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-strong);
}

.card__ribbon {
  flex-shrink: 0;
  width: 6px;
  border-radius: 3px;
  background: var(--card-accent, var(--accent));
  position: relative;
}
.card__ribbon::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 7px;
  background: var(--bg);
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 40%, 0 100%);
}

.card__pin-badge {
  position: absolute;
  top: -6px;
  right: 10px;
  font-size: 0.85rem;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.25));
}

.card__main { flex: 1; min-width: 0; }

.card__head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.card__favicon {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  flex-shrink: 0;
  object-fit: cover;
}
.card__favicon--fallback {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  background: none;
}

.card__name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.94rem;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card__url {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  margin: 0 0 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card__meta {
  font-size: 0.7rem;
  color: var(--text-faint);
  margin: 0;
}

.card__actions {
  display: flex;
  flex-direction: column;
  gap: 2px;
  opacity: 0;
  transform: translateX(4px);
  transition: opacity var(--transition-fast), transform var(--transition-fast);
}
.card:hover .card__actions,
.card:focus-within .card__actions {
  opacity: 1;
  transform: translateX(0);
}
.card__actions .icon-btn { width: 30px; height: 30px; min-width: 30px; min-height: 30px; font-size: 0.85rem; }

@media (hover: none) {
  .card__actions { opacity: 1; transform: none; }
}

/* ---------------------------------------------------------------------- */
/* Empty state                                                            */
/* ---------------------------------------------------------------------- */

.empty-state {
  text-align: center;
  padding: 64px 20px;
  color: var(--text-muted);
}
.empty-state__icon { font-size: 2.4rem; margin: 0 0 8px; }
.empty-state h2 { font-family: var(--font-display); margin-bottom: 6px; color: var(--text); }

/* ---------------------------------------------------------------------- */
/* Footer                                                                 */
/* ---------------------------------------------------------------------- */

.app-footer {
  text-align: center;
  padding: 20px;
  color: var(--text-faint);
  font-size: 0.78rem;
}

/* ---------------------------------------------------------------------- */
/* Slide-over editor panel                                                */
/* ---------------------------------------------------------------------- */

.editor-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 14, 23, 0.45);
  z-index: 60;
  opacity: 0;
  transition: opacity var(--transition-med);
}
.editor-overlay--visible { opacity: 1; }

.editor-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(420px, 100vw);
  background: var(--bg-raised);
  border-left: 1px solid var(--border);
  z-index: 70;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform var(--transition-med);
  box-shadow: var(--shadow-lg);
}
.editor-panel--open { transform: translateX(0); }

.editor-panel__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 22px;
  border-bottom: 1px solid var(--border);
}
.editor-panel__header h2 { font-size: 1.1rem; letter-spacing: -0.01em; }

.editor-form {
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  overflow-y: auto;
}

.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); }

.form-field input[type='text'],
.form-field select {
  height: 44px;
  padding: 0 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-sunken);
  color: var(--text);
}
.form-field input:focus, .form-field select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.form-field input[aria-invalid='true'] { border-color: var(--danger); }

.form-error {
  min-height: 16px;
  font-size: 0.76rem;
  color: var(--danger);
  margin: 0;
}

.form-field--row { flex-direction: row; align-items: center; }

.switch {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
}
.switch input { position: absolute; opacity: 0; width: 1px; height: 1px; }
.switch__track {
  width: 40px;
  height: 24px;
  border-radius: 999px;
  background: var(--bg-sunken);
  border: 1px solid var(--border-strong);
  position: relative;
  transition: background var(--transition-fast);
}
.switch__thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: var(--shadow-sm);
  transition: transform var(--transition-fast);
}
.switch input:checked + .switch__track { background: var(--accent); }
.switch input:checked + .switch__track .switch__thumb { transform: translateX(16px); }
.switch input:focus-visible + .switch__track { outline: 2px solid var(--accent); outline-offset: 2px; }

.editor-form__actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 4px;
}

/* ---------------------------------------------------------------------- */
/* Confirm dialog                                                         */
/* ---------------------------------------------------------------------- */

.confirm-dialog {
  position: fixed;
  inset: 0;
  z-index: 80;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10, 14, 23, 0.5);
  padding: 20px;
  animation: fadeIn var(--transition-fast);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.confirm-dialog__box {
  background: var(--bg-raised);
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 380px;
  width: 100%;
  box-shadow: var(--shadow-lg);
}
.confirm-dialog__box p { margin: 0 0 18px; }
.confirm-dialog__actions { display: flex; justify-content: flex-end; gap: 10px; }

/* ---------------------------------------------------------------------- */
/* Toasts                                                                 */
/* ---------------------------------------------------------------------- */

.toast-region {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}

.toast {
  background: var(--text);
  color: var(--bg);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 600;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity var(--transition-fast), transform var(--transition-fast);
}
.toast--visible { opacity: 1; transform: translateY(0); }

/* ---------------------------------------------------------------------- */
/* Responsive breakpoints                                                 */
/* ---------------------------------------------------------------------- */

@media (max-width: 720px) {
  .app-header { gap: 10px; padding: 0 12px; }
  .app-header__title { display: none; }
  .app-header__actions .btn span:last-child { display: none; }
  .app-main { padding: 18px 12px 48px; }
  .card-grid { grid-template-columns: 1fr; }
  .editor-panel { width: 100vw; }
  .stats-bar { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 420px) {
  .app-header__search-icon { left: 12px; }
  .app-header__search input { padding-left: 34px; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}

/* Landscape phones: keep header compact */
@media (max-height: 420px) and (orientation: landscape) {
  .app-header { height: 56px; }
  :root { --header-h: 56px; }
}

</style>
</head>
<body>

  <div data-menu-root></div>   <!-- menu renders here -->
  <header>...</header>
  
  <a class="skip-link" href="#main-content">Skip to content</a>

  <!-- ==================== HEADER ==================== -->
  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__mark" aria-hidden="true"></span>
      <span class="app-header__title">Marker</span>
    </div>

    <div class="app-header__search">

      <span class="app-header__search-icon" aria-hidden="true">⌕</span>

  <!-- ==================== SLIDE-OVER EDITOR PANEL ==================== -->

        <label for="field-category">Category</label>

          <option value="HEALTH">❤️ Health</option>

<script>
/**
 * bookmark.js
 * ------------------------------------------------------------------
 * Domain model + business rules for bookmarks. Nothing in this file
 * touches the DOM or localStorage directly — it only knows how to
 * build, validate, sort, filter, and transform bookmark records.
 * ------------------------------------------------------------------
 */

/** @typedef {'GENERAL'|'SPIRITUAL'|'HEALTH'|'STUDY'|'WORK'|'OTHER'} CategoryKey */

const CATEGORIES = Object.freeze({
  GENERAL: { key: 'GENERAL', label: 'General', icon: '🌐', color: 'var(--cat-general)' },
  SPIRITUAL: { key: 'SPIRITUAL', label: 'Spiritual', icon: '🕌', color: 'var(--cat-spiritual)' },
  HEALTH: { key: 'HEALTH', label: 'Health', icon: '❤️', color: 'var(--cat-health)' },
  STUDY: { key: 'STUDY', label: 'Study', icon: '📚', color: 'var(--cat-study)' },
  WORK: { key: 'WORK', label: 'Work', icon: '💼', color: 'var(--cat-work)' },
  OTHER: { key: 'OTHER', label: 'Other', icon: '📁', color: 'var(--cat-other)' },
});

const CATEGORY_ORDER = ['GENERAL', 'SPIRITUAL', 'HEALTH', 'STUDY', 'WORK', 'OTHER'];
const DEFAULT_CATEGORY = 'GENERAL';

const NAME_MAX_LEN = 80;
const URL_MAX_LEN = 2048;

/** Generates a RFC4122-ish UUID with a safe fallback for older WebViews. */
function generateId() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
    const r = (Math.random() * 16) | 0;
    const v = c === 'x' ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}

/**
 * Validates raw form input for a bookmark.
 * @returns {{valid:boolean, errors:Object<string,string>}}
 */
function validateBookmarkInput({ name, url, category }) {
  const errors = {};
  const trimmedName = (name ?? '').trim();
  const trimmedUrl = (url ?? '').trim();

  if (!trimmedName) {
    errors.name = 'Name is required.';
  } else if (trimmedName.length > NAME_MAX_LEN) {
    errors.name = `Name must be ${NAME_MAX_LEN} characters or fewer.`;
  }

  if (!trimmedUrl) {
    errors.url = 'URL is required.';
  } else if (trimmedUrl.length > URL_MAX_LEN) {
    errors.url = `URL must be ${URL_MAX_LEN} characters or fewer.`;
  } else if (!isValidHttpUrl(trimmedUrl)) {
    errors.url = 'Enter a valid URL starting with http:// or https://';
  }

  if (category && !CATEGORY_ORDER.includes(category)) {
    errors.category = 'Unknown category.';
  }

  return { valid: Object.keys(errors).length === 0, errors };
}

function isValidHttpUrl(value) {
  try {
    const u = new URL(value);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch {
    return false;
  }
}

/**
 * Builds a new, fully-formed bookmark record from validated form input.
 */
function createBookmark({ name, url, category, pinned }) {
  const now = new Date().toISOString();
  return {
    id: generateId(),
    sno: 0, // regenerated on every render/save pass
    name: name.trim(),
    category: category && CATEGORY_ORDER.includes(category) ? category : DEFAULT_CATEGORY,
    url: url.trim(),
    createdDate: now,
    lastModified: now,
    favorite: false,
    pinned: Boolean(pinned),
  };
}

/** Returns a new bookmark object with edits applied + lastModified bumped. */
function updateBookmark(existing, { name, url, category, pinned }) {
  return {
    ...existing,
    name: name.trim(),
    url: url.trim(),
    category: category && CATEGORY_ORDER.includes(category) ? category : existing.category,
    pinned: typeof pinned === 'boolean' ? pinned : existing.pinned,
    lastModified: new Date().toISOString(),
  };
}

/** Returns a duplicate of a bookmark with a fresh id/timestamps and "(Copy)" suffix. */
function duplicateBookmark(existing) {
  const now = new Date().toISOString();
  return {
    ...existing,
    id: generateId(),
    name: `${existing.name} (Copy)`,
    createdDate: now,
    lastModified: now,
  };
}

/** Toggles the pinned flag, returning a new object. */
function togglePinned(existing) {
  return { ...existing, pinned: !existing.pinned, lastModified: new Date().toISOString() };
}

/** Toggles the favorite flag, returning a new object. */
function toggleFavorite(existing) {
  return { ...existing, favorite: !existing.favorite, lastModified: new Date().toISOString() };
}

/**
 * Regenerates sequential sno values for a full list (call after any
 * add/edit/delete/reorder so displayed numbering stays contiguous).
 */
function regenerateSno(bookmarks) {
  return bookmarks.map((b, idx) => ({ ...b, sno: idx + 1 }));
}

/** Case-insensitive substring search against the bookmark name only. */
function searchByName(bookmarks, query) {
  const q = query.trim().toLowerCase();
  if (!q) return bookmarks;
  return bookmarks.filter((b) => b.name.toLowerCase().includes(q));
}

/** Filters by a single category key, or returns all when key is 'ALL'. */
function filterByCategory(bookmarks, categoryKey) {
  if (!categoryKey || categoryKey === 'ALL') return bookmarks;
  return bookmarks.filter((b) => b.category === categoryKey);
}

const SORT_COMPARATORS = {
  name: (a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }),
  category: (a, b) => a.category.localeCompare(b.category),
  createdDate: (a, b) => new Date(a.createdDate) - new Date(b.createdDate),
  lastModified: (a, b) => new Date(a.lastModified) - new Date(b.lastModified),
};

/**
 * Sorts a list per user-chosen field/direction, but ALWAYS keeps pinned
 * items first (pinned sort is a fixed business rule, not user-selectable).
 */
function sortBookmarks(bookmarks, field = 'name', direction = 'asc') {
  const comparator = SORT_COMPARATORS[field] || SORT_COMPARATORS.name;
  const sorted = [...bookmarks].sort((a, b) => {
    const base = comparator(a, b);
    return direction === 'desc' ? -base : base;
  });
  const pinned = sorted.filter((b) => b.pinned);
  const rest = sorted.filter((b) => !b.pinned);
  return [...pinned, ...rest];
}

/** Groups a list of bookmarks by category, preserving CATEGORY_ORDER. */
function groupByCategory(bookmarks) {
  const groups = {};
  for (const key of CATEGORY_ORDER) groups[key] = [];
  for (const b of bookmarks) {
    if (!groups[b.category]) groups[b.category] = [];
    groups[b.category].push(b);
  }
  return groups;
}

/** Computes dashboard statistics from the full unfiltered bookmark list. */
function computeStats(bookmarks) {
  const stats = {
    total: bookmarks.length,
    pinned: bookmarks.filter((b) => b.pinned).length,
  };
  for (const key of CATEGORY_ORDER) {
    stats[key] = bookmarks.filter((b) => b.category === key).length;
  }
  return stats;
}

/** Best-effort favicon URL for a bookmark's URL, with graceful fallback handled by UI. */
function faviconUrlFor(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?sz=64&domain=${u.hostname}`;
  } catch {
    return null;
  }
}

/**
 * storage.js
 * ------------------------------------------------------------------
 * Persistence layer. This is the ONLY module allowed to talk to
 * localStorage directly. Every other module goes through
 * StorageService so the storage format can change in one place.
 *
 * Schema is versioned so future releases can migrate old data
 * instead of wiping it.
 * ------------------------------------------------------------------
 */

const SCHEMA_VERSION = 1;
const KEY_PREFIX = 'bookmark-dashboard';

const KEYS = {
  DATA: `${KEY_PREFIX}-v${SCHEMA_VERSION}`,
  THEME: `${KEY_PREFIX}-theme`,
  COLLAPSED: `${KEY_PREFIX}-collapsed-sections`,
  SORT: `${KEY_PREFIX}-sort-prefs`,
  LEGACY_PREFIX: KEY_PREFIX, // used to detect older un-versioned keys
};

/**
 * Default shape of the persisted document.
 * @returns {{version:number, bookmarks:Array, updatedAt:string}}
 */
function emptyDocument() {
  return {
    version: SCHEMA_VERSION,
    bookmarks: [],
    updatedAt: new Date().toISOString(),
  };
}

class StorageService {
  constructor(storage = window.localStorage) {
    this.storage = storage;
  }

  /** Confirms localStorage is actually usable (private mode, quota, etc). */
  isAvailable() {
    try {
      const testKey = `${KEY_PREFIX}-__probe__`;
      this.storage.setItem(testKey, '1');
      this.storage.removeItem(testKey);
      return true;
    } catch (err) {
      return false;
    }
  }

  /**
   * Reads and migrates the bookmark document.
   * @returns {{version:number, bookmarks:Array, updatedAt:string}}
   */
  loadDocument() {
    const raw = this.storage.getItem(KEYS.DATA);
    if (!raw) {
      return this._migrateFromLegacyOrEmpty();
    }
    try {
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.bookmarks)) {
        throw new Error('Malformed bookmark document');
      }
      return this._runMigrations(parsed);
    } catch (err) {
      console.error('[storage] Failed to parse stored bookmarks, starting fresh.', err);
      return emptyDocument();
    }
  }

  /** Placeholder migration path — future schema bumps add cases here. */
  _runMigrations(doc) {
    if (doc.version === SCHEMA_VERSION) return doc;
    // Example of how a future migration would look:
    // if (doc.version === 1) { doc = migrateV1ToV2(doc); }
    doc.version = SCHEMA_VERSION;
    return doc;
  }

  _migrateFromLegacyOrEmpty() {
    // No legacy version exists yet (v1 is first release), so just start empty.
    return emptyDocument();
  }

  /**
   * Persists the full bookmark array.
   * @param {Array} bookmarks
   * @returns {boolean} success
   */
  saveBookmarks(bookmarks) {
    const doc = {
      version: SCHEMA_VERSION,
      bookmarks,
      updatedAt: new Date().toISOString(),
    };
    try {
      this.storage.setItem(KEYS.DATA, JSON.stringify(doc));
      return true;
    } catch (err) {
      console.error('[storage] Failed to save bookmarks (quota exceeded?).', err);
      return false;
    }
  }

  getBookmarks() {
    return this.loadDocument().bookmarks;
  }

  // ---- Theme preference -------------------------------------------------

  getTheme() {
    return this.storage.getItem(KEYS.THEME); // 'light' | 'dark' | null
  }

  setTheme(theme) {
    this.storage.setItem(KEYS.THEME, theme);
  }

  // ---- Collapsed section state -------------------------------------------

  getCollapsedSections() {
    try {
      const raw = this.storage.getItem(KEYS.COLLAPSED);
      return raw ? JSON.parse(raw) : {};
    } catch {
      return {};
    }
  }

  setCollapsedSections(map) {
    this.storage.setItem(KEYS.COLLAPSED, JSON.stringify(map));
  }

  // ---- Sort preferences ---------------------------------------------------

  getSortPrefs() {
    try {
      const raw = this.storage.getItem(KEYS.SORT);
      return raw ? JSON.parse(raw) : { field: 'name', direction: 'asc' };
    } catch {
      return { field: 'name', direction: 'asc' };
    }
  }

  setSortPrefs(prefs) {
    this.storage.setItem(KEYS.SORT, JSON.stringify(prefs));
  }
}

/**
 * ui.js
 * ------------------------------------------------------------------
 * Rendering layer. Owns every DOM read/write in the app. Consumers
 * (app.js) pass it data and callbacks; this module never mutates
 * bookmark data itself — it only reports user intent upward via the
 * callbacks it was given.
 * ------------------------------------------------------------------
 */

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

/** Escapes text for safe insertion into innerHTML. */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleDateString(undefined, {
      year: 'numeric',
      month: 'short',
      day: 'numeric',
    });
  } catch {
    return '—';
  }
}

class UIRenderer {
  /**
   * @param {Object} callbacks - handlers the UI reports user intent to.
   */
  constructor(callbacks) {
    this.callbacks = callbacks;
    this.els = {
      statsBar: $('#stats-bar'),
      categoryButtons: $('#category-filters'),
      sectionsContainer: $('#category-sections'),
      searchInput: $('#search-input'),
      sortField: $('#sort-field'),
      sortDirection: $('#sort-direction-btn'),
      themeToggle: $('#theme-toggle'),
      addBtn: $('#add-bookmark-btn'),
      panel: $('#editor-panel'),
      panelOverlay: $('#editor-overlay'),
      panelForm: $('#editor-form'),
      panelTitle: $('#editor-title'),
      panelClose: $('#editor-close'),
      panelCancel: $('#editor-cancel'),
      fieldName: $('#field-name'),
      fieldUrl: $('#field-url'),
      fieldCategory: $('#field-category'),
      fieldPinned: $('#field-pinned'),
      errorName: $('#error-name'),
      errorUrl: $('#error-url'),
      toastRegion: $('#toast-region'),
      emptyState: $('#empty-state'),
      confirmDialog: $('#confirm-dialog'),
      confirmMessage: $('#confirm-message'),
      confirmOk: $('#confirm-ok'),
      confirmCancel: $('#confirm-cancel'),
    };
    this._bindStaticEvents();
    this._activeCategory = 'ALL';
  }

  // ------------------------------------------------------------------
  // Static event wiring (things that never need re-binding on re-render)
  // ------------------------------------------------------------------

  _bindStaticEvents() {
    const { els, callbacks } = this;

    els.searchInput.addEventListener('input', (e) => callbacks.onSearch(e.target.value));

    els.sortField.addEventListener('change', (e) =>
      callbacks.onSortChange({ field: e.target.value })
    );
    els.sortDirection.addEventListener('click', () => callbacks.onToggleSortDirection());

    els.themeToggle.addEventListener('click', () => callbacks.onToggleTheme());

    els.addBtn.addEventListener('click', () => callbacks.onRequestAdd());

    els.panelClose.addEventListener('click', () => this.closePanel());
    els.panelCancel.addEventListener('click', () => this.closePanel());
    els.panelOverlay.addEventListener('click', () => this.closePanel());

    els.panelForm.addEventListener('submit', (e) => {
      e.preventDefault();
      callbacks.onSubmitForm(this.getFormValues());
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (!els.panel.hasAttribute('hidden')) this.closePanel();
        if (!els.confirmDialog.hasAttribute('hidden')) this._resolveConfirm(false);
      }
    });
  }

  // ------------------------------------------------------------------
  // Category filter bar
  // ------------------------------------------------------------------

  renderCategoryFilters(activeCategory) {
    this._activeCategory = activeCategory;
    const all = { key: 'ALL', label: 'All', icon: '✦' };
    const items = [all, ...CATEGORY_ORDER.map((k) => CATEGORIES[k])];

    this.els.categoryButtons.innerHTML = items
      .map((cat) => {
        const isActive = cat.key === activeCategory;
        return `
        <button
          type="button"
          class="chip ${isActive ? 'chip--active' : ''}"
          data-category="${cat.key}"
          aria-pressed="${isActive}"
        >
          <span class="chip__icon" aria-hidden="true">${cat.icon}</span>
          <span>${cat.label}</span>
        </button>`;
      })
      .join('');

    $$('.chip', this.els.categoryButtons).forEach((btn) => {
      btn.addEventListener('click', () => this.callbacks.onCategoryFilter(btn.dataset.category));
    });
  }

  // ------------------------------------------------------------------
  // Stats bar
  // ------------------------------------------------------------------

  renderStats(stats) {
    const cards = [
      { label: 'Total Links', value: stats.total, tone: 'primary' },
      { label: 'Pinned', value: stats.pinned, tone: 'pinned' },
      ...CATEGORY_ORDER.map((key) => ({
        label: CATEGORIES[key].label,
        value: stats[key],
        icon: CATEGORIES[key].icon,
        tone: key.toLowerCase(),
      })),
    ];

    this.els.statsBar.innerHTML = cards
      .map(
        (c) => `
        <div class="stat-card stat-card--${c.tone}">
          ${c.icon ? `<span class="stat-card__icon" aria-hidden="true">${c.icon}</span>` : ''}
          <span class="stat-card__value">${c.value}</span>
          <span class="stat-card__label">${c.label}</span>
        </div>`
      )
      .join('');
  }

  // ------------------------------------------------------------------
  // Category sections + bookmark cards
  // ------------------------------------------------------------------

  /**
   * @param {Object<string,Array>} groups - category key -> bookmark[]
   * @param {Object<string,boolean>} collapsedMap - category key -> collapsed?
   * @param {string} activeCategory - 'ALL' or a category key (controls which sections show)
   */
  renderSections(groups, collapsedMap, activeCategory) {
    const keysToRender =
      activeCategory === 'ALL' ? CATEGORY_ORDER : [activeCategory];

    const totalVisible = keysToRender.reduce((sum, k) => sum + (groups[k]?.length || 0), 0);

    if (totalVisible === 0) {
      this.els.sectionsContainer.innerHTML = '';
      this.els.emptyState.removeAttribute('hidden');
      return;
    }
    this.els.emptyState.setAttribute('hidden', '');

    this.els.sectionsContainer.innerHTML = keysToRender
      .filter((key) => (groups[key] || []).length > 0)
      .map((key) => this._renderSection(key, groups[key], Boolean(collapsedMap[key])))
      .join('');

    this._bindSectionEvents();
  }

  _renderSection(categoryKey, bookmarks, collapsed) {
    const cat = CATEGORIES[categoryKey];
    return `
      <section class="category-section" data-category="${categoryKey}">
        <button
          type="button"
          class="category-section__header"
          aria-expanded="${!collapsed}"
          data-toggle-category="${categoryKey}"
        >
          <span class="category-section__caret" aria-hidden="true">${collapsed ? '▶' : '▼'}</span>
          <span class="category-section__icon" aria-hidden="true">${cat.icon}</span>
          <span class="category-section__title">${cat.label}</span>
          <span class="category-section__count">${bookmarks.length}</span>
        </button>
        <div class="category-section__body" ${collapsed ? 'hidden' : ''}>
          <div class="card-grid">
            ${bookmarks.map((b) => this._renderCard(b)).join('')}
          </div>
        </div>
      </section>`;
  }

  _renderCard(bookmark) {
    const cat = CATEGORIES[bookmark.category] || CATEGORIES.GENERAL;
    const favicon = faviconUrlFor(bookmark.url);
    const iconMarkup = favicon
      ? `<img src="${favicon}" alt="" class="card__favicon" loading="lazy"
           onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'card__favicon card__favicon--fallback',textContent:'${cat.icon}'}))" />`
      : `<span class="card__favicon card__favicon--fallback">${cat.icon}</span>`;

    return `
      <article class="card" data-id="${bookmark.id}" style="--card-accent:${cat.color}" tabindex="0">
        ${bookmark.pinned ? '<span class="card__pin-badge" title="Pinned" aria-label="Pinned">📌</span>' : ''}
        <div class="card__ribbon" aria-hidden="true"></div>
        <div class="card__main">
          <div class="card__head">
            ${iconMarkup}
            <h3 class="card__name" title="${escapeHtml(bookmark.name)}">${escapeHtml(bookmark.name)}</h3>
          </div>
          <p class="card__url" title="${escapeHtml(bookmark.url)}">${escapeHtml(bookmark.url)}</p>
          <p class="card__meta">Added ${formatDate(bookmark.createdDate)}</p>
        </div>
        <div class="card__actions">
          <button type="button" class="icon-btn" data-action="open" title="Open" aria-label="Open ${escapeHtml(bookmark.name)}">↗</button>
          <button type="button" class="icon-btn" data-action="edit" title="Edit" aria-label="Edit ${escapeHtml(bookmark.name)}">✎</button>
          <button type="button" class="icon-btn" data-action="duplicate" title="Duplicate" aria-label="Duplicate ${escapeHtml(bookmark.name)}">⧉</button>
          <button type="button" class="icon-btn ${bookmark.pinned ? 'icon-btn--active' : ''}" data-action="pin" title="${bookmark.pinned ? 'Unpin' : 'Pin'}" aria-label="${bookmark.pinned ? 'Unpin' : 'Pin'} ${escapeHtml(bookmark.name)}">📌</button>
          <button type="button" class="icon-btn icon-btn--danger" data-action="delete" title="Delete" aria-label="Delete ${escapeHtml(bookmark.name)}">🗑</button>
        </div>
      </article>`;
  }

  _bindSectionEvents() {
    $$('[data-toggle-category]', this.els.sectionsContainer).forEach((header) => {
      header.addEventListener('click', () =>
        this.callbacks.onToggleSection(header.dataset.toggleCategory)
      );
    });

    $$('.card', this.els.sectionsContainer).forEach((card) => {
      const id = card.dataset.id;

      card.addEventListener('click', (e) => {
        const actionEl = e.target.closest('[data-action]');
        if (!actionEl) return;
        e.stopPropagation();
        this.callbacks.onCardAction(actionEl.dataset.action, id);
      });

      // Enter/Space opens the link when the card itself (not a button) is focused
      card.addEventListener('keydown', (e) => {
        if ((e.key === 'Enter' || e.key === ' ') && e.target === card) {
          e.preventDefault();
          this.callbacks.onCardAction('open', id);
        }
      });
    });
  }

  // ------------------------------------------------------------------
  // Slide-over editor panel
  // ------------------------------------------------------------------

  openPanel({ mode, bookmark }) {
    const { els } = this;
    els.panelTitle.textContent = mode === 'edit' ? 'Edit bookmark' : 'Add bookmark';
    els.panelForm.dataset.mode = mode;
    els.panelForm.dataset.editingId = bookmark?.id || '';

    els.fieldName.value = bookmark?.name || '';
    els.fieldUrl.value = bookmark?.url || '';
    els.fieldCategory.value = bookmark?.category || 'GENERAL';
    els.fieldPinned.checked = Boolean(bookmark?.pinned);

    this.clearFormErrors();

    els.panel.removeAttribute('hidden');
    els.panelOverlay.removeAttribute('hidden');
    requestAnimationFrame(() => {
      els.panel.classList.add('editor-panel--open');
      els.panelOverlay.classList.add('editor-overlay--visible');
    });
    els.fieldName.focus();

    document.body.classList.add('no-scroll');
  }

  closePanel() {
    const { els } = this;
    els.panel.classList.remove('editor-panel--open');
    els.panelOverlay.classList.remove('editor-overlay--visible');
    document.body.classList.remove('no-scroll');
    setTimeout(() => {
      els.panel.setAttribute('hidden', '');
      els.panelOverlay.setAttribute('hidden', '');
    }, 220);
  }

  getFormValues() {
    return {
      name: this.els.fieldName.value,
      url: this.els.fieldUrl.value,
      category: this.els.fieldCategory.value,
      pinned: this.els.fieldPinned.checked,
    };
  }

  showFormErrors(errors) {
    this.clearFormErrors();
    if (errors.name) {
      this.els.errorName.textContent = errors.name;
      this.els.fieldName.setAttribute('aria-invalid', 'true');
    }
    if (errors.url) {
      this.els.errorUrl.textContent = errors.url;
      this.els.fieldUrl.setAttribute('aria-invalid', 'true');
    }
  }

  clearFormErrors() {
    this.els.errorName.textContent = '';
    this.els.errorUrl.textContent = '';
    this.els.fieldName.removeAttribute('aria-invalid');
    this.els.fieldUrl.removeAttribute('aria-invalid');
  }

  // ------------------------------------------------------------------
  // Confirm dialog (used for delete confirmation)
  // ------------------------------------------------------------------

  confirm(message) {
    const { els } = this;
    els.confirmMessage.textContent = message;
    els.confirmDialog.removeAttribute('hidden');
    els.confirmOk.focus();

    return new Promise((resolve) => {
      this._resolveConfirm = (result) => {
        els.confirmDialog.setAttribute('hidden', '');
        okHandler.remove?.();
        resolve(result);
      };
      const okHandler = () => this._resolveConfirm(true);
      const cancelHandler = () => this._resolveConfirm(false);
      els.confirmOk.addEventListener('click', okHandler, { once: true });
      els.confirmCancel.addEventListener('click', cancelHandler, { once: true });
    });
  }

  // ------------------------------------------------------------------
  // Toasts
  // ------------------------------------------------------------------

  toast(message, tone = 'default') {
    const el = document.createElement('div');
    el.className = `toast toast--${tone}`;
    el.setAttribute('role', 'status');
    el.textContent = message;
    this.els.toastRegion.appendChild(el);
    requestAnimationFrame(() => el.classList.add('toast--visible'));
    setTimeout(() => {
      el.classList.remove('toast--visible');
      setTimeout(() => el.remove(), 200);
    }, 2600);
  }

  // ------------------------------------------------------------------
  // Theme
  // ------------------------------------------------------------------

  applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    this.els.themeToggle.setAttribute('aria-label', `Switch to ${theme === 'dark' ? 'light' : 'dark'} theme`);
    this.els.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
  }

  // ------------------------------------------------------------------
  // Sort controls
  // ------------------------------------------------------------------

  applySortPrefs({ field, direction }) {
    this.els.sortField.value = field;
    this.els.sortDirection.textContent = direction === 'asc' ? '↑ Asc' : '↓ Desc';
    this.els.sortDirection.setAttribute('aria-label', `Sort direction: ${direction === 'asc' ? 'ascending' : 'descending'}`);
  }
}

/**
 * app.js
 * ------------------------------------------------------------------
 * Application entry point and controller. Owns the current in-memory
 * state (bookmarks + view settings), coordinates StorageService,
 * the pure functions in bookmark.js, and UIRenderer. No direct DOM
 * access happens here — that's UIRenderer's job.
 * ------------------------------------------------------------------
 */

class App {
  constructor() {
    this.storage = new StorageService();
    this.ui = new UIRenderer({
      onSearch: (q) => this.setSearch(q),
      onCategoryFilter: (key) => this.setCategoryFilter(key),
      onToggleSection: (key) => this.toggleSection(key),
      onSortChange: ({ field }) => this.setSort({ field }),
      onToggleSortDirection: () => this.toggleSortDirection(),
      onToggleTheme: () => this.toggleTheme(),
      onRequestAdd: () => this.openAddPanel(),
      onSubmitForm: (values) => this.handleFormSubmit(values),
      onCardAction: (action, id) => this.handleCardAction(action, id),
    });

    this.state = {
      bookmarks: [],
      searchQuery: '',
      activeCategory: 'ALL',
      sort: this.storage.getSortPrefs(),
      collapsed: this.storage.getCollapsedSections(),
    };

    this._init();
  }

  _init() {
    if (!this.storage.isAvailable()) {
      // Local Storage is unavailable (private browsing lockdown, etc). The
      // app still functions for the session; it just can't persist.
      console.warn('[app] localStorage unavailable — data will not persist.');
    }

    this.state.bookmarks = this.storage.getBookmarks();

    const savedTheme = this.storage.getTheme();
    const systemPrefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
    this.currentTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
    this.ui.applyTheme(this.currentTheme);

    // Keep in sync with OS theme changes only if user hasn't picked manually.
    window.matchMedia?.('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!this.storage.getTheme()) {
        this.currentTheme = e.matches ? 'dark' : 'light';
        this.ui.applyTheme(this.currentTheme);
      }
    });

    this.ui.applySortPrefs(this.state.sort);
    this.ui.renderCategoryFilters(this.state.activeCategory);
    this._persistAndRender({ persist: false });
  }

  // ------------------------------------------------------------------
  // Derived view + rendering
  // ------------------------------------------------------------------

  _getVisibleBookmarks() {
    let list = this.state.bookmarks;
    list = searchByName(list, this.state.searchQuery);
    list = filterByCategory(list, this.state.activeCategory);
    list = sortBookmarks(list, this.state.sort.field, this.state.sort.direction);
    return list;
  }

  _render() {
    const stats = computeStats(this.state.bookmarks);
    this.ui.renderStats(stats);

    const visible = this._getVisibleBookmarks();
    const groups = groupByCategory(visible);
    this.ui.renderSections(groups, this.state.collapsed, this.state.activeCategory);
  }

  /** Regenerates sno, persists to storage, and re-renders the view. */
  _persistAndRender({ persist = true } = {}) {
    this.state.bookmarks = regenerateSno(
      sortBookmarks(this.state.bookmarks, 'name', 'asc')
    );
    if (persist) this.storage.saveBookmarks(this.state.bookmarks);
    this._render();
  }

  // ------------------------------------------------------------------
  // Search / filter / sort / collapse / theme handlers
  // ------------------------------------------------------------------

  setSearch(query) {
    this.state.searchQuery = query;
    this._render();
  }

  setCategoryFilter(key) {
    this.state.activeCategory = key;
    this.ui.renderCategoryFilters(key);
    this._render();
  }

  toggleSection(categoryKey) {
    this.state.collapsed[categoryKey] = !this.state.collapsed[categoryKey];
    this.storage.setCollapsedSections(this.state.collapsed);
    this._render();
  }

  setSort({ field }) {
    this.state.sort.field = field;
    this.storage.setSortPrefs(this.state.sort);
    this.ui.applySortPrefs(this.state.sort);
    this._render();
  }

  toggleSortDirection() {
    this.state.sort.direction = this.state.sort.direction === 'asc' ? 'desc' : 'asc';
    this.storage.setSortPrefs(this.state.sort);
    this.ui.applySortPrefs(this.state.sort);
    this._render();
  }

  toggleTheme() {
    this.currentTheme = this.currentTheme === 'dark' ? 'light' : 'dark';
    this.storage.setTheme(this.currentTheme);
    this.ui.applyTheme(this.currentTheme);
  }

  // ------------------------------------------------------------------
  // CRUD flows
  // ------------------------------------------------------------------

  openAddPanel() {
    this.ui.openPanel({ mode: 'add', bookmark: { category: DEFAULT_CATEGORY } });
  }

  openEditPanel(id) {
    const bookmark = this.state.bookmarks.find((b) => b.id === id);
    if (!bookmark) return;
    this.ui.openPanel({ mode: 'edit', bookmark });
  }

  handleFormSubmit(values) {
    const { valid, errors } = validateBookmarkInput(values);
    if (!valid) {
      this.ui.showFormErrors(errors);
      return;
    }

    const mode = this.ui.els.panelForm.dataset.mode;
    const editingId = this.ui.els.panelForm.dataset.editingId;

    if (mode === 'edit' && editingId) {
      const existing = this.state.bookmarks.find((b) => b.id === editingId);
      if (existing) {
        const updated = updateBookmark(existing, values);
        this.state.bookmarks = this.state.bookmarks.map((b) =>
          b.id === editingId ? updated : b
        );
        this.ui.toast('Bookmark updated.');
      }
    } else {
      const created = createBookmark(values);
      this.state.bookmarks = [...this.state.bookmarks, created];
      this.ui.toast('Bookmark added.');
    }

    this.ui.closePanel();
    this._persistAndRender();
  }

  async handleCardAction(action, id) {
    const bookmark = this.state.bookmarks.find((b) => b.id === id);
    if (!bookmark) return;

    switch (action) {
      case 'open':
        window.open(bookmark.url, '_blank', 'noopener,noreferrer');
        break;

      case 'edit':
        this.openEditPanel(id);
        break;

      case 'duplicate': {
        const copy = duplicateBookmark(bookmark);
        this.state.bookmarks = [...this.state.bookmarks, copy];
        this.ui.toast('Bookmark duplicated.');
        this._persistAndRender();
        break;
      }

      case 'pin': {
        this.state.bookmarks = this.state.bookmarks.map((b) =>
          b.id === id ? togglePinned(b) : b
        );
        this.ui.toast(bookmark.pinned ? 'Unpinned.' : 'Pinned to top.');
        this._persistAndRender();
        break;
      }

      case 'delete': {
        const confirmed = await this.ui.confirm(
          `Delete "${bookmark.name}"? This cannot be undone.`
        );
        if (!confirmed) return;
        this.state.bookmarks = this.state.bookmarks.filter((b) => b.id !== id);
        this.ui.toast('Bookmark deleted.');
        this._persistAndRender();
        break;
      }

      default:
        break;
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  window.__bookmarkDashboardApp = new App();
});

</script>
